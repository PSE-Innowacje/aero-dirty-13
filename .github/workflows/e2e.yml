name: E2E Tests

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - master

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: aero
          POSTGRES_PASSWORD: aero_secret
          POSTGRES_DB: aero
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aero -d aero"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://aero:aero_secret@localhost:5432/aero
      SECRET_KEY: ci-test-secret-key
      BACKEND_CORS_ORIGINS: '["http://localhost:5173"]'

    steps:
      # ── Checkout ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Python / Backend ──────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Run Alembic migrations
        working-directory: backend
        run: python -m alembic upgrade head

      # ── Node / Frontend ───────────────────────────────────
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      # ── Start services ────────────────────────────────────
      - name: Start backend (uvicorn)
        working-directory: backend
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          echo "Waiting for backend at /api/health ..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/api/health > /dev/null 2>&1; then
              echo "Backend ready after ~${i}s"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "ERROR: Backend failed to start within 30s"
              exit 1
            fi
            sleep 1
          done

      - name: Start frontend (vite dev)
        working-directory: frontend
        run: |
          npm run dev &
          echo "Waiting for frontend at http://localhost:5173 ..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5173 > /dev/null 2>&1; then
              echo "Frontend ready after ~${i}s"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "ERROR: Frontend failed to start within 30s"
              exit 1
            fi
            sleep 1
          done

      # ── Run E2E tests ─────────────────────────────────────
      - name: Run Playwright tests
        working-directory: frontend
        run: npx playwright test

      # ── Artifacts on failure ──────────────────────────────
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

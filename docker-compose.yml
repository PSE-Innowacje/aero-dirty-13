services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aero}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    env_file: .env
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend

  tls-init:
    image: alpine:3.20
    command: >
      sh -c "
      apk add --no-cache openssl &&
      if [ ! -f /certs/aero.crt ] || [ ! -f /certs/aero.key ]; then
        openssl req -x509 -nodes -newkey rsa:2048 -sha256 -days 365 -keyout /certs/aero.key -out /certs/aero.crt -subj '/CN=localhost' -addext 'subjectAltName=DNS:localhost,IP:127.0.0.1';
      fi
      "
    volumes:
      - nginx_certs:/certs

  nginx:
    image: nginx:alpine
    command: >
      /bin/sh -c "while [ ! -f /etc/nginx/certs/aero.crt ] || [ ! -f /etc/nginx/certs/aero.key ]; do sleep 1; done; nginx -g 'daemon off;'"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
      - tls-init

volumes:
  postgres_data:
  nginx_certs:
